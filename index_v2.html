<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copilot 一分鐘小教室 · Power of Copilot</title>
<style>
  :root{
    --bg:#f6f8fb; --panel:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb;
    --accent:#0F6CBD; --accent2:#8378DE; --gold:#946800; --ok:#16a34a;
    --chip:#eef2f7; --chip-on:#0F6CBD; --shadow:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.08);
  }
  [data-theme="dark"]{
    --bg:#0f172a; --panel:#1e293b; --ink:#f1f5f9; --muted:#94a3b8; --line:#334155;
    --accent:#60a5fa; --accent2:#a78bfa;
    --chip:#1e293b; --shadow:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.5);
  }
  [data-theme="dark"] body{color:#e2e8f0}
  [data-theme="dark"] header{background:#1e293b;border-bottom-color:#334155}
  [data-theme="dark"] .tabs{background:#0f172a;border-color:#334155}
  [data-theme="dark"] .tabs button{color:#cbd5e1}
  [data-theme="dark"] .tabs button.on{background:#3b82f6;color:#fff}
  [data-theme="dark"] .search input{background:#0f172a;color:#e2e8f0;border-color:#334155}
  [data-theme="dark"] .seg{background:#0f172a;border-color:#334155}
  [data-theme="dark"] .seg button{color:#cbd5e1}
  [data-theme="dark"] .seg button.on{background:#3b82f6;color:#fff}
  [data-theme="dark"] aside, [data-theme="dark"] .card, [data-theme="dark"] .recent{background:#1e293b;border-color:#334155}
  [data-theme="dark"] .card .ttl{color:#f1f5f9}
  [data-theme="dark"] .card .prev{color:#cbd5e1}
  [data-theme="dark"] .card .actions{border-top-color:#334155}
  [data-theme="dark"] .card .actions button{background:#0f172a;color:#e2e8f0;border-color:#334155}
  [data-theme="dark"] .card .seq{background:#0f172a}
  [data-theme="dark"] .card[data-kind=Agent] .seq{background:#1e3a5f;color:#93c5fd}
  [data-theme="dark"] .card[data-kind=Prompt] .seq{background:#3b2f6b;color:#c4b5fd}
  [data-theme="dark"] .card .tags .tag{background:#0f172a;color:#cbd5e1}
  [data-theme="dark"] .chip{background:#0f172a;color:#cbd5e1}
  [data-theme="dark"] .ver-bar a{background:#0f172a;border-color:#334155;color:#94a3b8}
  [data-theme="dark"] .kbd{background:#0f172a;border-color:#334155;color:#cbd5e1}
  [data-theme="dark"] .modal-card{background:#1e293b}
  [data-theme="dark"] .modal-head{border-bottom-color:#334155;color:#f1f5f9}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:"Microsoft JhengHei UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:#111827;font-size:16px;font-weight:450}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer}

  /* ── Top nav ──────────────────────────────── */
  header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .nav{display:flex;align-items:center;gap:18px;padding:10px 20px;max-width:1480px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:10px;white-space:nowrap}
  .brand .ico{font-size:24px}
  .brand-stack{display:flex;flex-direction:column;line-height:1.1;align-items:center}
  .brand-text{font-weight:800;font-size:20px;color:var(--accent)}
  .brand-sub{font-size:11.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:2px}
  .tabs{display:inline-flex;background:#f3f4f6;border:1px solid var(--line);border-radius:8px;padding:3px;gap:0}
  .tabs button{padding:7px 16px;border:none;background:transparent;color:#4b5563;font-size:15px;font-weight:600;border-radius:6px;line-height:1.4;cursor:pointer;position:relative}
  .tabs button + button:not(.on)::before{content:"";position:absolute;left:-1px;top:22%;bottom:22%;width:1px;background:#9ca3af}
  .tabs button.on + button::before,.tabs button:hover::before{display:none}
  .tabs button:hover:not(.on){background:#e5e7eb}
  .tabs button.on{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(15,108,189,.3);font-weight:700}
  .favbtn{padding:7px 14px;border:1px solid var(--line);background:#fff;color:#4b5563;font-size:15px;font-weight:600;border-radius:8px;cursor:pointer;margin-left:8px}
  .favbtn:hover{background:#f3f4f6}
  .favbtn.on{background:#fff7d6;border-color:#f59e0b;color:#92400e}
  [data-theme="dark"] .favbtn{background:#1e293b;border-color:#334155;color:#cbd5e1}
  [data-theme="dark"] .favbtn.on{background:#78350f;border-color:#f59e0b;color:#fde68a}
  .tabs button.on.prompt{background:var(--accent);border:none}
  .tabs button.on.all{background:var(--accent);border:none}
  .search{flex:1;max-width:520px;position:relative}
  .search input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  .search::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.6}
  /* Segmented toggle group */
  .seg{display:inline-flex;background:#f3f4f6;border:1px solid var(--line);border-radius:8px;padding:3px;gap:0}
  .seg button{padding:6px 13px;border:none;background:transparent;font-size:14px;color:#4b5563;font-weight:600;border-radius:6px;line-height:1.4;position:relative}
  .seg button + button:not(.on)::before{content:"";position:absolute;left:-1px;top:22%;bottom:22%;width:1px;background:#9ca3af}
  .seg button.on + button::before,.seg button:hover::before{display:none}
  .seg button:hover:not(.on){background:#e5e7eb}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(15,108,189,.3);font-weight:700}
  .toggles{display:flex;gap:10px;align-items:center}
  .kbd{padding:1px 6px;background:#f3f4f6;border:1px solid var(--line);border-radius:4px;font-family:ui-monospace,monospace;font-size:11px;color:#374151}

  /* ── Layout ──────────────────────────────── */
  .wrap{display:grid;grid-template-columns:280px 1fr;gap:18px;padding:18px 20px;max-width:1480px;margin:0 auto}
  aside{position:sticky;top:60px;align-self:start;max-height:calc(100vh - 80px);overflow:auto;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
  aside h4{margin:0 0 12px 0;font-size:13px;letter-spacing:0;color:var(--accent);font-weight:800;display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  aside h4::before{content:"";display:inline-block;width:3px;height:13px;background:var(--accent);border-radius:2px;flex:none}
  aside .section{margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed var(--line)}
  aside .section:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
  aside .section.download-section{border-bottom:none;padding-bottom:10px;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 10px;background:var(--chip);border-radius:14px;font-size:13px;margin:4px 5px 4px 0;border:1px solid transparent;cursor:pointer;user-select:none;min-width:78px;box-sizing:border-box}
  .tag-section-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px;padding-left:2px;opacity:.85}
  .ui-switch{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:14px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;white-space:nowrap;margin-left:6px}
  .ui-switch:hover{background:#e0e7ff}
  .ui-switch .ui-switch-icon{font-size:14px}
  .ui-switch .ui-switch-badge{font-size:9px;padding:1px 5px;background:#6366f1;color:#fff;border-radius:6px;margin-left:2px;font-weight:700;letter-spacing:.04em}
  [data-theme="dark"] .ui-switch{background:#1e293b;color:#a5b4fc;border-color:#334155}
  [data-theme="dark"] .ui-switch:hover{background:#312e81}
  [data-theme="dark"] .ui-switch .ui-switch-badge{background:#818cf8}
  .tag-row{display:flex;flex-wrap:wrap;margin-bottom:4px}
  [data-theme="dark"] .tag-section-label{color:#94a3b8}
  .chip.lic{align-items:center;gap:6px;line-height:1.35}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip .x{opacity:.7}
  .clear{font-size:13px;color:var(--accent);background:none;border:none;padding:0;margin-top:6px;cursor:pointer}

  /* ── Hero / featured ──────────────────────────────── */
  .hero{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}
  .featured{background:linear-gradient(135deg,#0F6CBD 0%,#5B5FC7 60%,#8378DE 100%);color:#fff;border-radius:14px;padding:18px 22px;position:relative;overflow:hidden}
  .featured h2{margin:0;font-size:18px;letter-spacing:1px}
  .featured .sub{opacity:.85;font-size:13px;margin-top:4px}
  .featured .list{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .featured .pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:999px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px)}
  .featured .pill:hover{background:rgba(255,255,255,.3)}

  .recent{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .recent h3{margin:0 0 8px 0;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.5px}
  .recent ol{margin:0;padding-left:20px}
  .recent li{padding:3px 0;font-size:13px}
  .recent .empty{color:var(--muted);font-size:12px;font-style:italic}

  /* ── Card grid ──────────────────────────────── */
  .stats{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:var(--muted);font-size:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;transition:.15s;position:relative}
  .card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
  .card .head{display:flex;justify-content:space-between;align-items:start;gap:6px}
  .card .seq{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);background:#f3f4f6;padding:2px 7px;border-radius:5px}
  .card .fav{background:none;border:none;font-size:18px;padding:0;opacity:.3}
  .card .fav.on{opacity:1;color:#f59e0b}
  .card .ttl{font-size:17.5px;font-weight:800;line-height:1.4;color:#0F172A}
  .card .ename{font-size:13.5px;color:var(--muted);margin-top:-2px;font-weight:500}
  .card .prev{font-size:14px;color:#374151;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:66px}
  .card .tags{display:flex;flex-wrap:wrap;gap:4px}
  .card .tags .tag{font-size:11px;background:#eef2f7;color:#374151;padding:2px 7px;border-radius:4px}
  .card .actions{display:flex;gap:6px;margin-top:auto;padding-top:6px;border-top:1px solid var(--line)}
  .card .actions button{flex:1;padding:8px;font-size:13px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);font-weight:600}
  .card .actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .card .actions button.primary.prompt{background:var(--accent2);border-color:var(--accent2)}
  .card[data-kind=Agent] .seq{color:var(--accent);background:#e8f1f9}
  .card[data-kind=Prompt] .seq{color:var(--accent2);background:#efedfa}
  .ver-bar{display:flex;gap:4px;font-size:11px}
  .ver-bar a{padding:2px 8px;border:1px solid var(--line);border-radius:5px;color:var(--muted)}
  .ver-bar a:hover{border-color:var(--accent);color:var(--accent)}

  /* ── Modal ──────────────────────────────── */
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
  .modal.on{display:flex}
  .modal-card{width:min(900px,92vw);height:min(80vh,720px);background:#fff;border-radius:14px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.3)}
  .modal-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .modal iframe{flex:1;width:100%;border:none}
  .modal-head .x{background:none;border:none;font-size:22px;color:var(--muted)}

  /* ── Empty / no results ──────────────────────────────── */
  .empty-state{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty-state h3{margin:0 0 6px 0;font-size:18px;color:var(--ink)}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.2s;z-index:200;pointer-events:none}
  .toast.on{opacity:1}

  @media(max-width:920px){
    .wrap{grid-template-columns:1fr}
    aside{position:relative;top:0;max-height:none}
    .hero{grid-template-columns:1fr}
    .nav{flex-wrap:wrap}
    .search{order:99;max-width:none;width:100%}
  }
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand">
      <span class="ico">📚</span>
      <span class="brand-stack">
        <span class="brand-text" data-i18n="brandTitle">Copilot 一分鐘小教室</span>
        <span class="brand-sub">Power of Copilot</span>
      </span>
    </div>
    <div class="tabs">
      <button data-tab="Agent" class="on">⚡ Agent</button>
      <button data-tab="Prompt">💬 Prompt</button>
    </div>
    <button id="favBtn" class="favbtn" title="只看我的最愛"><span data-i18n="favBtn">⭐ 我的最愛</span></button>
    <div class="search">
      <input id="q" data-i18n-placeholder="searchPh" placeholder="搜尋編號、名稱、內容…  /  快捷鍵 /">
    </div>
    <div class="toggles">
      <div class="seg" id="ver">
        <button data-ver="v1">v1</button>
        <button data-ver="v2" class="on">v2</button>
      </div>
      <div class="seg lang" id="lang">
        <button data-lang="zh" class="on">中文</button>
        <button data-lang="en">EN</button>
      </div>
      <div class="seg lang" id="theme">
        <button data-theme="light" class="on" title="淺色">☀️</button>
        <button data-theme="dark" title="深色">🌙</button>
      </div>
      <a id="uiSwitch" class="ui-switch" href="index.html" title="切換為經典版介面">
        <span class="ui-switch-icon">↺</span>
        <span class="ui-switch-text" data-i18n="uiSwitchOld">回經典版</span>
        <span class="ui-switch-badge">PREVIEW</span>
      </a>
    </div>
  </div>
</header>

<main class="wrap">
  <aside id="sidebar">
    <div class="section download-section">
      <a id="download-zip" href="PowerOfCopilot.zip" download style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 12px;background:linear-gradient(135deg,#0F6CBD 0%,#0a5599 100%);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(15,108,189,0.35);transition:transform .15s,box-shadow .15s;" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 10px rgba(15,108,189,0.5)';" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 6px rgba(15,108,189,0.35)';" data-i18n="download">⬇️ 全部下載 (.zip)</a>
    </div>
    <div class="section">
      <h4 data-i18n="hScene">場景</h4>
      <div id="tagBox"></div>
      <button class="clear" id="clearTags" data-i18n="clearTags">清除標籤</button>
    </div>
    <div class="section">
      <h4 data-i18n="hLicense">授權</h4>
      <span class="chip lic" data-license="basic"><span>💬</span><span>Microsoft 365 Copilot<br><span data-i18n="licBasic">基本版 (Basic)</span></span></span>
      <span class="chip lic" data-license="premium"><span>✨</span><span>Microsoft 365 Copilot<br><span data-i18n="licPremium">進階版 (Premium)</span></span></span>
    </div>
    <div class="section">
      <h4 data-i18n="hSort">排序</h4>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:#6b7280;font-size:14px" data-i18n="bySeq">編號</span>
        <button id="sortDir" class="favbtn" title="切換升降冪" style="padding:5px 12px;margin:0">↓</button>
      </div>
    </div>
  </aside>

  <section>
    <div class="hero">
      <div class="featured">
        <h2><span>🆕 </span><span data-i18n="heroTitle">本週新刊</span></h2>
        <div class="sub" data-i18n="heroSub">最新 6 篇 — 點即看</div>
        <div id="featList" class="list"></div>
      </div>
      <div class="recent">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <h3 data-i18n="recentTitle" style="margin:0">最近看過</h3>
          <button id="recentClear" data-i18n="clear" title="清除" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;padding:2px 6px">清除</button>
        </div>
        <ol id="recentList"><li class="empty" data-i18n="noRecent">尚無瀏覽紀錄</li></ol>
      </div>
    </div>

    <div class="stats">
      <span id="cnt">— 篇</span>
      <span><span class="kbd">/</span> <span data-i18n="kbdSearch">搜尋</span>　<span class="kbd">Esc</span> <span data-i18n="kbdClear">清除</span>　<span class="kbd">F</span> <span data-i18n="kbdFav">收藏目前篩選結果</span></span>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty-state" style="display:none">
      <h3 data-i18n="emptyTitle">沒有符合條件的結果</h3>
      <p data-i18n="emptyHint">試試清除標籤或換個搜尋詞</p>
    </div>
  </section>
</main>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-head">
      <strong id="modalTitle">—</strong>
      <span>
        <a id="modalMsg" href="#" style="font-size:14px;font-weight:600;color:#d46b08;background:#fff4e5;border:1px solid #ffd591;padding:9px 14px;border-radius:8px;text-decoration:none;margin-right:8px" title="用 Outlook 開啟 .eml 檔（可編輯/寄送）" data-i18n="openMsg">📧 用 Outlook 開啟</a>
        <a id="modalOpen" href="#" target="_blank" style="font-size:14px;font-weight:600;color:#0F6CBD;background:#fff;border:1px solid #cfe5f6;padding:9px 14px;border-radius:8px;text-decoration:none;margin-right:8px" data-i18n="newTab">在新分頁開啟 ↗</a>
        <button class="x" id="modalClose">×</button>
      </span>
    </div>
    <iframe id="modalFrame" src="about:blank"></iframe>
  </div>
</div>

<div class="toast" id="toast">已複製</div>

/*PREV_ZH-START*/var PREV_ZH = {"A001":"**主管新聞聚合器（Exec News Aggregator）** 透過蒐集、過濾、摘要近期、可信賴且相關的產業新聞與趨勢，協助你保持資訊靈通。 它會交付精簡、聚焦決策的更新內容，並依你的關注領域客製化， 幫助你掌握市場變化、競爭對手動態與法規異動，避免資訊過載。","A002":"這個 Agent 透過每日挑戰與互動測驗，幫助使用者提升提示詞工程技能。它使用 GSEC 框架（目標 Goal、來源 Source、期望 Expectation、情境 Context）教導並強化最佳實踐，並透過實作練習鼓勵使用者不斷迭代、反思與成長。","A003":"SWOT Agent 協助使用者針對各種主題——包括產品、團隊、事業單位、策略與計畫——產生結構化且具洞察力的 SWOT 分析。它是策略規劃、回顧會議、工作坊和主管報告的寶貴工具，幫助找出關鍵洞察、對齊利害關係人，並以清晰精準的方式支援決策制定。","A004":"你是一位工作說明書建立工具。你的職責是根據使用者輸入及提供的參考文件或範本，撰寫詳細且有效的工作說明書（Statement of Work, SoW）。","A005":"活動問答 Agent 協助你快速導覽 [活動名稱]。無論你在尋找議程場次、場地資訊還是講者介紹，活動 Agent 都能確保你充分享受活動體驗。","A006":"這個 Agent 協助使用者從會議、工作坊或專家討論中萃取關鍵學習和知識元素，並將其轉化為簡潔、即用的學習片段。它分析描述、文件、筆記或其他內容，生成可快速分享或加入內部知識庫的摘要、測驗題和實用技巧。","A007":"情境模擬器 Agent 協助商業使用者透過對話式 What-if 模擬，預先探索營運和財務變化的影響。透過解讀自然語言輸入，Agent 生成結構化的決策簡報，包含假設條件、敏感度分析、風險因素和建議下一步。設計用於快速探索性分析，而非取代正式的財務或營運系統。","A008":"一個多功能的專案助手，專為簡化 Microsoft 365 計畫而設計，提供結構化引導、規劃支援和最佳實踐洞察。內建彈性設計，可輕鬆客製化用於其他 IT 或業務專案，確保各種場景下都能達成一致、可擴展且高效的專案執行。","A009":"這個 Agent 協助使用者為解決方案和專案產生有創意、相關且專業的名稱。它一致輸出 10 個名稱建議，每個都搭配一句朗朗上口的 Slogan，確保輸出既有想像力又適合專業使用。設計用於支援各行業的內部團隊或外部客戶，依使用者偏好調整語氣和語言。","A010":"AI 思維顧問是你識別合適 AI 解決方案的專業嚮導。無論你在探索 Microsoft 365 Copilot，還是不確定從哪裡開始，這個助手都會引導你完成結構化的探索流程，挖掘你的目標、痛點和 AI 機會，並推薦最合適的 AI 驅動解決方案。","A011":"這個 Agent 透過每日挑戰與互動測驗，幫助使用者提升提示詞工程技能。它使用 GSEC 框架（目標 Goal、來源 Source、期望 Expectation、情境 Context）教導並強化最佳實踐，並透過實作練習鼓勵使用者不斷迭代、反思與成長。","A012":"這個 Agent 審查單一上傳文件，並根據內部分類指引建議適當的資料分類標籤。建議結果包含以文件原始語言撰寫的正式說明。","A013":"SMART Agent 協助使用者使用 SMART 框架定義、精煉和確定目標範圍。SMART 代表：具體 Specific、可測量 Measurable、吸引人 Attractive、現實的 Realistic、有期限 Time-bound（德文：Spezifisch, Messbar, Attraktiv, Realistisch, Terminiert）。此框架廣泛應用於商業、教育和健康領域，","A014":"這個 Agent 協助法律專業人員比對保密協議（NDA），分析上傳的文件和內部參考文件，識別並突顯關鍵條款、潛在風險和文件之間的差異。Agent 以表格格式輸出結構化比較，確保整個過程的法律準確性、清晰度和保密性。","A015":"協助使用者為其 Agent 撰寫高品質的指示詞，或審查現有指示詞並整合建議的改善方案。","A016":"一個分析上傳文字和文件的 Agent，提供建設性回饋，並建議可直接實施和使用的清晰改善方案。","A017":"使用本 Copilot Agent 打造你的個人解題夥伴，幫助你解決各種挑戰！透過 AI 引導的互動式對話，以逐步深入的方式探索你的問題，並提供建議和更深入的分析，每一輪對話都更接近解決方案。","A018":"**新聞聚合 Agent（Exec News Aggregator）** 主動為主管提供精簡、可信、即時的產業新聞摘要，依個人關注領域客製化內容。支援即時警示、互動式查詢與持續學習，幫助決策者快速掌握市場、競爭與法規變化，保持資訊領先。","A019":"**清單宣言 Agent（Checklist Manifesto）** 協助使用者為複雜或高風險任務設計與審查清單，把零散待辦轉成清晰可執行的步驟。確保關鍵環節不被遺漏、邏輯順序合理，提升交付一致性與品質。","A020":"**談判大師 Agent（Dealcrafter）** 作為談判助手，協助使用者規劃、模擬、提案與優化談判結果。引導你拆解利益、設計策略、預演對話，並在事後檢討中持續強化談判能力。","A021":"提升企業學習素材的品質。協助內容創作者製作高品質、吸引人且有效的學習內容，用於內部溝通。從定義目標、了解受眾、最佳化內容到確保正確語調，全程支援內容創作流程，提升培訓計畫效果，賦能員工發展。","A022":"幫助使用者透過多標準決策分析（MCDA）框架，以清晰、逐步的方式做出明智選擇。透過結構化呈現選項評估，提升決策品質，確保透明、以證據為基礎的決策流程，降低認知偏差，為日常工作場景中的複雜決策帶來清晰度。","A023":"幫助員工改善身心健康，同時提升日常生產力。提供個人化指導，包括每日生產力提示、工作生活平衡建議，以及快速健康建議（桌邊伸展、正念練習、時間管理技巧）。透過鼓勵健康習慣與激勵訊息，幫助使用者將健康融入工作日常，維持高效表現。","A024":"依據使用者查詢和輸入，從中擷取洞察並結合最新產業趨勢。將這些資訊合成為可行的創新想法，使用結構化框架和提示詞引導腦力激盪，並透過遊戲化設計（挑戰賽或測驗）將創意轉化為促進團隊參與的活動。","A025":"協助產品團隊（產品經理、UX 設計師、軟體開發者）進行早期產品規劃。利用 Agile 使用者故事、客戶旅程地圖和 JTBD 等成熟框架，將原始想法轉化為可行、以使用者為中心的產出物。確保產出一致、高品質，並與業務目標對齊，幫助團隊優先排序功能，有效協作。","A026":"**目標對齊 Agent（Coherence Agent）** 協助團隊維持策略一致性，分析使用者貼上的目標、計畫與內容，找出落差、矛盾與隱藏依賴。透過結構化提示，協助對齊跨部門方向、化解溝通鴻溝。","A027":"透過行為科學框架 COM-B（能力、機會、動機）幫助使用者突破行為障礙，建立一致的決心和挑戰。提供及時、個性化的支持，讓技能採用、流程執行、習慣養成和決策更直覺、更可達成，成為你全年可靠的行為改變夥伴。","A028":"**說故事導師（Storytelling Mentor）** 協助使用者編織動人故事、架構有影響力的演說、提升簡報與提案的表達力。適用於 pitch、領導演說、產品發表等場合，從故事骨架到台風細節都能優化。","A029":"在 Facebook、Instagram、Twitter、LinkedIn 和 TikTok 等多個平台上，創建、最佳化和管理吸引人的社群媒體內容。維持品牌聲音、提升互動率和驅動成長，同時確保符合法律與道德標準。可選擇性地在 Agent 設定中加入你的品牌指南和最佳實踐作為知識來源，讓輸出更貼近品牌風格。","A030":"**同儕回饋 Agent（Peer Feedback）** 協助你為同事撰寫專業、用心的回饋或讚美，無論是慶賀里程碑、給予建設性建議或感謝協助。確保語氣得體、重點清晰，讓回饋既真誠又有影響力。","A031":"幫助最佳化即將進行的會議簡報，審查內容、識別冗餘，並提出精簡版本，在保留關鍵訊息的同時節省時間。主要功能：確認會議細節（時長、受眾、預留時間）、分析重複或冗餘投影片、建議整合與時間調整、確保語調和內容符合特定受眾。輸出精簡且符合受眾需求的簡報，同時維持合規性和品牌指南。","A032":"Porter Five Forces Profiler 協助使用者透過 Michael Porter 的五力架構，分析任一產業的競爭結構與市場吸引力，並提供策略性洞察與行動建議。","A033":"Say No Coach 2 透過 PLANT 框架（Pause、Listen、Acknowledge、Negotiate、Tend）協助使用者在職場以專業、尊重且自信的方式婉拒請求，提供具同理心的回應範本與替代方案。","A034":"OKR Coach Agent 協助使用者把策略主題或目標轉化為結構良好、可量化、可執行的 OKR（Objectives & Key Results），並建議對應行動方案。","A035":"A/B Testing Ideas 協助行銷與產品團隊針對任意主題快速產出多組可執行的 A/B 測試假設，包含變數設計、預期 KPI 影響與實驗計畫。","A036":"Meeting Recap Companion 將會議逐字稿或筆記轉換為結構化的會後摘要，包含關鍵決策、行動事項、負責人與時程，方便團隊跟進。","A037":"Policy Author Pro 將政策主題與粗略想法轉化為符合企業標準的完整政策文件草稿，提供一致的章節結構與專業語氣。","A038":"Monthly KPI Comparator 接受當月與前月 KPI 數據，自動計算變化幅度，產生具洞察的月度比較報告與主管摘要。","A039":"Agent of Change 協助使用者規劃並推動組織變革，透過 Why/What/Who/How/When 框架建立清晰、以人為本的變革計畫。","A040":"Meeting Prep 協助使用者在會前快速規劃議程、識別關鍵問題、準備談話要點與反向論點，提升會議效率。","A041":"Policy Simplifier 將冗長複雜的政策文件轉為易讀的角色專屬一頁說明，包含關鍵重點、待辦清單、禁止事項與待釐清項目。","A042":"Evite 透過引導問題協助使用者快速產出有溫度、有設計感的 Outlook 會議邀請，可直接貼上寄送。","A043":"在你把想法、計畫、決策帶到真實聽眾面前之前，先把它們狠狠壓力測試一遍。揭露隱性假設、跑一場 pre-mortem、預測最挑剔的主管會丟出哪些最難的問題。預設絕不肯定。當你不想要一個應聲蟲時，這個 Agent 正好能派上用場。","A044":"「團隊參與與士氣助手」是一個宣告式 Agent，協助主管、個別貢獻者、HR 人員或任何團隊成員打造正向且具包容力的團隊文化。它依團隊規模、工作模式（遠距／混合／實體）與明確偏好，提供具創意、可擴展的團隊建立活動、表揚方案與士氣提振活動建議。Agent 同時支援活動規劃、參與度追蹤與合規檢查，協助組織做資料驅動的決策，並推動高影響力且一致的員工參與計畫。","A045":"一個運作於 Copilot Chat 的 Agent，會分析使用者提供的月度 KPI，產出結構化、可直接呈報主管的執行摘要。Agent 會比較本月與上月的 KPI、突顯進步與下滑的指標、僅根據使用者提供的備註做詮釋，並產出適合 Email 更新或月度業務檢討的清楚評論。讓 KPI 月報維持一致、可重複，且不需存取任何外部系統。","A046":"一個運作於 Copilot Chat 的 Agent，協助使用者把專案構想轉換成結構完整、適合呈報管理層的商業提案。Agent 會根據使用者提供的專案描述、預期效益與估算成本，產出包含問題敘述、解決方案、策略對齊、成本效益分析、時程、風險分析、替代方案、財務指標與明確建議的商業提案，最後再產出 Executive Summary。資料不足時會明確標示缺口，不會憑空編造數字。","A047":"一個運作於 Copilot Chat 的 Agent，協助使用者系統化規劃或優化任何業務流程。Agent 先以 9 道結構化問題收集脈絡（新／舊流程、目標、KPI、scope、利害關係人、資源、限制等），確認 scope 後才產出完整工作藍圖。輸出包含：流程概覽、SIPOC 流程結構表（步驟、輸入、輸出、負責人、相依性、時程）、資源矩陣、風險與行動表、里程碑與 KPI 表，以及（若為優化既有流程）","A048":"一個運作於 Copilot Chat 的 Agent，把一個工作坊想法變成可立即執行的完整教案。Agent 先以 7 道結構化問題收集脈絡（主題、核心目標、對象與人數、時長、線上／實體／混合、限制、輸出語言），確認 scope 後才產出。輸出包含：2–3 個 SMART 學習目標與關鍵收穫、表格化的計時議程（含方法與教材）、每個內容區塊至少一個互動活動（含目標、教材、逐步說明、依人數調整的變化版）","P001":"每次對話都要從頭交代自己？三個問題搞定，從此不重複。","P002":"從你真實的郵件和聊天，自動建立一份個人風格指南。","P003":"從你的收件匣挖出高影響力的貢獻機會&mdash;還幫你評分。","P004":"在文件上線前，揪出每一個無障礙問題。","P005":"把 40 封往來的郵件串，變成一份乾淨的利害關係人更新。","P006":"開會前30秒就有結構化議程，讓每分鐘 1:1 都有價值","P007":"兩句話掌握長郵件串，任務不遺漏，回覆不費力","P008":"針對任何主題，幾分鐘內生成結構完整、附引用的高管簡報","P009":"分析前先清資料，一個 Prompt 找出所有問題並給你修復指南","P010":"一個 var TASK_LABELS = {
  writing:       { zh:'✍️ 寫作',  en:'✍️ Writing' },
  analysis:      { zh:'📊 分析',  en:'📊 Analysis' },

};
var TOOL_LABELS = {
  outlook:    { zh:'📧 Outlook',     en:'📧 Outlook' },
  teams:      { zh:'💬 Teams',       en:'💬 Teams' },
  excel:      { zh:'📊 Excel',       en:'📊 Excel' },

  word:       { zh:'📝 Word',        en:'📝 Word' },
  general:    { zh:'🌐 通用',        en:'🌐 General' }
};
var TASK_ORDER = ['writing','analysis','communication','planning','learning','automation','strategy'];
var TOOL_ORDER = ['outlook','teams','excel','powerpoint','word','general'];
function tagLabel(t, lang){
  lang = lang || state.lang;
  var p = t.indexOf(':');
  if (p < 0) return t;
  var kind = t.slice(0,p), key = t.slice(p+1);
  var L = kind === 'task' ? TASK_LABELS[key] : TOOL_LABELS[key];
  return L ? L[lang] : key;
}

// ─── Tag auto-derivation (task + tool from TAG_MAP) ──────
function tagsFor(it){
  var m = TAG_MAP[it.seq] || {t:[],u:[]};
  var out = [];
  (m.t||[]).forEach(function(x){ out.push('task:'+x); });
  (m.u||[]).forEach(function(x){ out.push('tool:'+x); });
  return out;
}

// ─── Aggregate by seq (group v1+v2) ─────────────────────
function groupedItems(){
  const map = new Map();
  for (const it of ALL_ITEMS){
    const k = `${it.kind}_${it.seq}`;
    if (!map.has(k)) map.set(k, {...it, versions:[it.ver]});
    else map.get(k).versions.push(it.ver);
  }
  // build enriched: tags, hasFav, sortKey
  for (const v of map.values()){
    v.tags = tagsFor(v);
    v.isFav = state.fav.has(v.key.replace(/_(v\d)$/,'')); // use bare seq key
    v.favKey = `${v.kind}_${v.seq}`;
    v.sortSeq = parseInt(v.seq.replace(/\D/g,''),10);
  }
  return Array.from(map.values());
}

// ─── Filter ────────────────────────────────────────────
function applyFilters(items){
  let arr = items.slice();
  if (state.tab === 'Agent' || state.kindFilter === 'Agent') arr = arr.filter(x=>x.kind==='Agent');
  if (state.tab === 'Prompt' || state.kindFilter === 'Prompt') arr = arr.filter(x=>x.kind==='Prompt');
  if (state.favOnly) arr = arr.filter(x=>state.fav.has(x.favKey));
  if (state.tags.size) arr = arr.filter(x=> [...state.tags].every(t=>x.tags.includes(t)));
  if (state.license === 'basic') arr = arr.filter(x=>x.license === 'free');
  else if (state.license === 'premium') arr = arr.filter(x=>x.license === 'required');
  if (state.q){
    const q = state.q.toLowerCase();
    arr = arr.filter(x=>{
      const blob = `${x.seq} ${x.name||''} ${x.cname||''} ${x.preview||''} ${x.preview_en||''} ${x.tags.join(' ')}`.toLowerCase();
      return blob.includes(q);
    });
  }
  const dir = state.sortDir === 'asc' ? 1 : -1;
  if (state.sort === 'seq') arr.sort((a,b)=>(a.sortSeq - b.sortSeq) * dir);
  else if (state.sort === 'alpha') arr.sort((a,b)=>(a.cname||a.name||'').localeCompare(b.cname||b.name||'','zh-Hant') * dir);
  return arr;
}

// ─── Render ────────────────────────────────────────────
function pickHref(it, ver){
  ver = ver || (state.ver === 'v1' ? 'v1' : (state.ver === 'v2' ? 'v2' : it.versions.includes('v2') ? 'v2' : 'v1'));
  const lang = state.lang;
  const all = ALL_ITEMS.filter(x=>x.seq===it.seq && x.kind===it.kind && x.ver===ver);
  if (!all.length) return null;
  const target = all[0];
  return lang === 'zh' ? target.file : target.en_file;
}

function renderCards(items){
  const grid = document.getElementById('grid');
  const emp  = document.getElementById('empty');
  document.getElementById('cnt').textContent = items.length + ' ' + I18N[state.lang].unit;
  if (!items.length){ grid.innerHTML=''; emp.style.display='block'; return; }
  emp.style.display='none';
  grid.innerHTML = items.map(it=>{
    const href = pickHref(it);
    const tags = it.tags.slice(0,4).map(t=>`<span class="tag">${tagLabel(t)}</span>`).join('');
    const isFav = state.fav.has(it.favKey);
    const titleZH = it.cname || it.name;
    const titleEN = it.name;
    return `
    <div class="card" data-kind="${it.kind}" data-key="${it.favKey}">
      <div class="head">
        <span class="seq">${it.seq}</span>
        <button class="fav ${isFav?'on':''}" title="${I18N[state.lang].favTip}" data-fav="${it.favKey}">${isFav?'★':'☆'}</button>
      </div>
      <div class="ttl">${state.lang==='zh'?titleZH:titleEN}</div>
      <div class="ename">${state.lang==='zh'?titleEN:(it.cname||'')}</div>
      <div class="prev">${(state.lang==='en' ? (it.preview_en||it.preview||'') : (it.preview||'')).replace(/[<>]/g,'').replace(/&amp;/g,'&')||'<span style="color:#9ca3af">— '+I18N[state.lang].noPrev+' —</span>'}</div>
      <div class="tags">${tags}</div>
      <div class="ver-bar">${it.versions.map(v=>`<a href="${pickHref(it,v)}" target="_blank" data-stop>${v}</a>`).join('')}</div>
      <div class="actions">
        <button data-open="${href}" data-seq="${it.seq}" data-title="${(it.cname||it.name||'').replace(/"/g,'')}">👁 ${I18N[state.lang].preview}</button>
        <button class="primary ${it.kind==='Prompt'?'prompt':''}" data-newtab="${href}">↗ ${I18N[state.lang].open}</button>
      </div>
    </div>`;
  }).join('');
}

function renderFeatured(items){
  // 6 newest, regardless of kind/lang
  const items_ = items.slice().sort((a,b)=>b.sortSeq - a.sortSeq).slice(0,6);
  document.getElementById('featList').innerHTML = items_.map(it=>{
    const href = pickHref(it);
    const title = state.lang==='zh'?(it.cname||it.name):it.name;
    return `<span class="pill" data-open="${href}" data-seq="${it.seq}" data-title="${title.replace(/"/g,'')}">${it.kind==='Agent'?'⚡':'💬'} ${it.seq} ${title}</span>`;
  }).join('');
}

function renderRecent(){
  const ol = document.getElementById('recentList');
  if (!state.recent.length){ ol.innerHTML='<li class="empty">'+I18N[state.lang].noRecent+'</li>'; return; }
  ol.innerHTML = state.recent.slice(0,5).map(r=>{
    let seq = r.seq;
    let it = seq ? ALL_ITEMS.find(x=>x.seq===seq) : ALL_ITEMS.find(x=>pickHref(x)===r.href || x.versions.some(v=>pickHref(x,v)===r.href));
    if (it) seq = it.seq;
    const label = it ? (state.lang==='zh' ? (it.cname||it.name) : it.name) : r.title;
    const prefix = seq ? `<span style="color:#6b7280;font-variant-numeric:tabular-nums">${seq}</span> ` : '';
    return `<li><a href="${r.href}" target="_blank" rel="noopener">${prefix}${label}</a></li>`;
  }).join('');
}

function renderTagBox(items){
  const counts = new Map();
  items.forEach(it=>it.tags.forEach(t=>counts.set(t,(counts.get(t)||0)+1)));
  const box = document.getElementById('tagBox');
  const lang = state.lang;
  function renderRow(orderArr, kindPrefix){
    return orderArr.map(function(key){
      var t = kindPrefix + ':' + key;
      var c = counts.get(t) || 0;
      if (!c) return '';
      var on = state.tags.has(t) ? 'on' : '';
      return `<span class="chip ${on}" data-tag="${t}">${tagLabel(t, lang)}<small> ${c}</small></span>`;
    }).join('');
  }
  var sectTask = lang==='zh' ? '任務' : 'Task';
  var sectTool = lang==='zh' ? '工具' : 'Tool';
  box.innerHTML =
    `<div class="tag-section-label">${sectTask}</div><div class="tag-row">${renderRow(TASK_ORDER, 'task')}</div>` +
    `<div class="tag-section-label">${sectTool}</div><div class="tag-row">${renderRow(TOOL_ORDER, 'tool')}</div>`;
}

// ─── Master refresh ────────────────────────────────────
function refresh(){
  const grouped = groupedItems();
  // Pre-filter (without tags/q) to compute available tags for the current scope
  const scoped = applyFilters(grouped.map(x=>({...x, tags:x.tags}))); // not needed extra, but ok
  // For tag chips show counts across grouped (independent of tag filter)
  const baseScope = grouped.filter(x=>{
    if (state.tab==='Agent' && x.kind!=='Agent') return false;
    if (state.tab==='Prompt' && x.kind!=='Prompt') return false;
    if (state.favOnly && !state.fav.has(x.favKey)) return false;
    return true;
  });
  renderTagBox(baseScope);
  const filtered = applyFilters(grouped);
  renderCards(filtered);
  const featScope = grouped.filter(x=>{
    if (state.tab==='Agent' && x.kind!=='Agent') return false;
    if (state.tab==='Prompt' && x.kind!=='Prompt') return false;
    return true;
  });
  renderFeatured(featScope);
  renderRecent();
}

// Modal
function showModal(href, title){
  if (!href){ toast('檔案路徑無效'); return; }
  document.getElementById('modalTitle').textContent = title || '';
  document.getElementById('modalFrame').src = href;
  document.getElementById('modalOpen').href = href;
  const emlPath = href.replace(/\/([^/]+)\.html$/, '/eml/$1.eml');
  const modalMsg = document.getElementById('modalMsg');
  modalMsg.href = emlPath;
  modalMsg.setAttribute('download', emlPath.split('/').pop());
  document.getElementById('modal').classList.add('on');
}
document.getElementById('modalClose').onclick = ()=>document.getElementById('modal').classList.remove('on');
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') document.getElementById('modal').classList.remove('on'); });

function addRecent(href, title, seq){
  state.recent = [{href,title,seq,t:Date.now()}, ...state.recent.filter(r=> seq ? r.seq!==seq : r.href!==href)].slice(0,10);
  localStorage.setItem(LS.recent, JSON.stringify(state.recent));
  renderRecent();
}

document.getElementById('recentClear').addEventListener('click', ()=>{
  state.recent = [];
  localStorage.removeItem(LS.recent);
  renderRecent();
});

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 1400);
}

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT'){
    e.preventDefault();
    document.getElementById('q').focus();
  } else if (e.key === 'Escape'){
    const q = document.getElementById('q');
    if (document.getElementById('modal').classList.contains('on')) {
      document.getElementById('modal').classList.remove('on');
    } else if (q.value) {
      q.value=''; state.q=''; refresh();
    }
  }
});

  document.documentElement.setAttribute('data-theme', b.dataset.theme);
  localStorage.setItem(LS.theme, b.dataset.theme);
  document.querySelectorAll('#theme button').forEach(x=>x.classList.toggle('on', x===b));
});

applyI18n();
refresh();
</script>
</body>
</html>

// init lang from URL or localStorage
(function initLang() {
  const params = new URLSearchParams(location.search);
  const urlLang = params.get('lang');
  const stored = localStorage.getItem('powerofcopilot.lang');
  const validLangs = ['zh', 'zh-cn', 'en'];
  function browserLang(){
    const langs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || '']).map(x => (x || '').toLowerCase());
    for (const l of langs) {
      if (l === 'zh' || l.startsWith('zh-tw') || l.startsWith('zh-hk') || l.startsWith('zh-mo') || l.includes('hant')) return 'zh';
      if (l.startsWith('zh-cn') || l.startsWith('zh-sg') || l.includes('hans')) return 'zh-cn';
      if (l.startsWith('en')) return 'en';
    }
    return 'zh';
  }
  const lang = validLangs.includes(urlLang) ? urlLang : (validLangs.includes(stored) ? stored : browserLang());
  state.lang = lang;
  const storedSort = localStorage.getItem('powerofcopilot.sort');
  if (storedSort === 'asc' || storedSort === 'desc') state.sort = storedSort;
})();

function key() { return state.type + '_' + state.v; }
function isMobile() { return window.matchMedia('(max-width: 760px)').matches; }
function items() {
  const arr = (CATALOG[key()] || []).slice();
  arr.sort((a, b) => {
    const na = parseInt((a.seq || '').slice(1), 10) || 0;
    const nb = parseInt((b.seq || '').slice(1), 10) || 0;
    return state.sort === 'desc' ? nb - na : na - nb;
  });
  return arr;
}
function isEN() { return state.lang === 'en'; }
function isZhCn() { return state.lang === 'zh-cn'; }
function localizedName(it) {
  if (isEN()) return it.name;
  if (isZhCn()) return it.cname_zh_cn || it.cname || it.name;
  return it.cname || it.name;
}
function secondaryName(it) {
  if (isEN()) return it.cname || '';
  return it.name || '';
}
function fileOf(it) {
  if (isEN()) return it.en_file || null;
  if (isZhCn()) return it.zh_cn_file || null;
  return it.file;
}

function renderList() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const colorClass = state.type === 'Prompt' ? 'prompt' : '';
  const list = document.getElementById('list');
  const filtered = items().filter(it => {
    if (!q) return true;
    const hay = (it.seq + ' ' + it.name + ' ' + (it.cname || '') + ' ' + (it.cname_zh_cn || '')).toLowerCase();
    return hay.includes(q);
  });
  if (!filtered.length) { list.innerHTML = '<div class="empty">' + t().empty + '</div>'; return; }
  list.innerHTML = filtered.map(it => {
    const f = fileOf(it);
    const disabled = !f ? 'disabled' : '';
    const active = (f && state.file === f) ? 'active ' + colorClass : '';
    const primary = localizedName(it);
    const secondary = secondaryName(it);
    const subEn = secondary ? `<span class="en">${secondary}</span>` : '';
    const tip = !f ? ' title="English version not available yet"' : '';
    return `<a href="#" class="${active} ${disabled}" data-file="${f || ''}" data-name="${it.seq} — ${primary}"${tip}>
      <span class="seq">${it.seq}</span>${primary}${subEn}
    </a>`;
  }).join('');
  list.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      if (a.classList.contains('disabled') || !a.dataset.file) return;
      load(a.dataset.file, a.dataset.name);
    });
  });
}

function load(file, name) {
  state.file = file;
  document.getElementById('frame').src = file;
  document.getElementById('name').textContent = name;
  document.getElementById('open-new').href = file;
  // .eml 路徑：v1/Agent/Foo.html -> v1/Agent/eml/Foo.eml (zh & en 都有)
  const msgPath = file.replace(/\/([^/]+)\.html$/, '/eml/$1.eml');
  const msgBtn = document.getElementById('open-msg');
  msgBtn.style.display = '';
  msgBtn.href = msgPath;
  msgBtn.setAttribute('download', msgPath.split('/').pop());
  renderList();
  if (isMobile()) document.body.classList.add('mobile-preview-open');
}

    document.body.classList.remove('mobile-preview-open');
    if (state.file) {
      const m = state.file.match(/([AP]\d{3})_/);
      if (m) {
        const same = items().find(it => it.seq === m[1]);
        if (same) {
          const f = fileOf(same);
          if (f) { load(f, same.seq + ' — ' + localizedName(same)); return; }
        }
      }
    }
    renderList();
    autoSelectFirst();
  });
});

      }
      state.file = null;
      document.getElementById('frame').src = 'about:blank';
      document.getElementById('name').textContent = t().placeholder;
    }
    renderList();
  });
});

document.getElementById('q').addEventListener('input', renderList);

document.getElementById('mobile-back').addEventListener('click', () => {
  document.body.classList.remove('mobile-preview-open');
});

document.getElementById('sortBtn').addEventListener('click', () => {
  state.sort = state.sort === 'desc' ? 'asc' : 'desc';
  localStorage.setItem('powerofcopilot.sort', state.sort);
  const u = t();
  document.getElementById('sortBtn').textContent = state.sort === 'desc' ? u.sortDesc : u.sortAsc;
  renderList();
});

document.querySelectorAll('.langtoggle button').forEach(x => x.classList.toggle('active', x.dataset.lang === state.lang));
applyI18n();
renderList();

// auto-select the first item on initial load + every category/version switch
function autoSelectFirst() {
  if (isMobile()) return;
  const first = items().find(it => fileOf(it));
  if (first) {
    const f = fileOf(first);
    const primary = localizedName(first);
    load(f, first.seq + ' — ' + primary);
  }
}
autoSelectFirst();
</script>
</body>
</html>

let state = { type: 'Agent', v: 'v1', file: null };

function key() { return state.type + '_' + state.v; }
function items() { return CATALOG[key()] || []; }

function renderList() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const colorClass = state.type === 'Prompt' ? 'prompt' : '';
  const list = document.getElementById('list');
  const filtered = items().filter(it => {
    if (!q) return true;
    const hay = (it.seq + ' ' + it.name + ' ' + (it.cname || '')).toLowerCase();
    return hay.includes(q);
  });
  if (!filtered.length) { list.innerHTML = '<div class="empty">沒有符合的項目</div>'; return; }
  list.innerHTML = filtered.map(it => {
    const active = state.file === it.file ? 'active ' + colorClass : '';
    const display = it.cname || it.name;
    const subEn = it.cname ? `<span class="en">${it.name}</span>` : '';
    return `<a href="#" class="${active}" data-file="${it.file}" data-name="${it.seq} — ${display}">
      <span class="seq">${it.seq}</span>${display}${subEn}
    </a>`;
  }).join('');
  list.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      load(a.dataset.file, a.dataset.name);
    });
  });
}

function load(file, name) {
  state.file = file;
  document.getElementById('frame').src = file;
  document.getElementById('name').textContent = name;
  document.getElementById('open-new').href = file;
  // .msg 路徑：v1/Agent/Foo.html -> v1/Agent/msg/Foo.msg
  const msgPath = file.replace(/\/([^/]+)\.html$/, '/msg/$1.msg');
  document.getElementById('open-msg').href = msgPath;
  renderList();
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.type = t.dataset.type;
    state.file = null;
    document.getElementById('frame').src = 'about:blank';
    document.getElementById('name').textContent = '— 從左側清單選一篇 —';
    renderList();
  });
});

document.querySelectorAll('.vbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.vbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.v = b.dataset.v;
    // Try to keep same seq when switching version
    if (state.file) {
      const m = state.file.match(/([AP]\d{3})_/);
      if (m) {
        const same = items().find(it => it.seq === m[1]);
        if (same) { load(same.file, same.seq + ' — ' + (same.cname || same.name)); return; }
      }
    }
    renderList();
  });
});

document.getElementById('q').addEventListener('input', renderList);

renderList();
</script>

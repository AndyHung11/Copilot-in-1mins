  .list a.disabled { color: #c1c7d0; cursor: not-allowed; background: #fafbfc; }
  .list a.disabled .seq { background: #eef0f3; color: #9ca3af; }

  .list a.active.prompt { background: #f3f1fb; border-left-color: #8378DE; }

  .list a.active.prompt .seq { background: #8378DE; color: #fff; }
  .empty { padding: 20px; text-align: center; color: #9ca3af; font-size: 13px; }
  /* Main / preview */

  .toolbar { padding: 10px 16px; background: #fff; border-bottom: 1px solid #e3e8ee; display: flex; align-items: center; gap: 12px; font-size: 13px; }

    openNew: 'Open in new tab ↗',
    docTitle: 'Copilot in 1 Minute — Newsletter Index'
  }
};
function t() { return UI[state.lang]; }

function applyI18n() {
  const u = t();
  document.title = u.docTitle;
  document.documentElement.lang = state.lang === 'en' ? 'en' : 'zh-Hant';
  document.getElementById('brand-title').textContent = u.title;
  document.getElementById('brand-sub').textContent = u.sub;
  document.getElementById('tab-agent').textContent = u.tabAgent;
  document.getElementById('tab-prompt').textContent = u.tabPrompt;
  document.getElementById('v1btn').textContent = u.v1;
  document.getElementById('v2btn').textContent = u.v2;
  document.getElementById('q').placeholder = u.search;
  document.getElementById('open-msg').textContent = u.openMsg;
  document.getElementById('open-new').textContent = u.openNew;
  if (!state.file) document.getElementById('name').textContent = u.placeholder;
}

// init lang from URL or localStorage
(function initLang() {
  const params = new URLSearchParams(location.search);
  const urlLang = params.get('lang');
  const stored = localStorage.getItem('powerofcopilot.lang');
  const lang = (urlLang === 'en' || urlLang === 'zh') ? urlLang : (stored === 'en' ? 'en' : 'zh');
  state.lang = lang;
})();

function key() { return state.type + '_' + state.v; }
function items() { return CATALOG[key()] || []; }
function isEN() { return state.lang === 'en'; }
function fileOf(it) { return isEN() ? (it.en_file || null) : it.file; }

function renderList() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const colorClass = state.type === 'Prompt' ? 'prompt' : '';
  const list = document.getElementById('list');
  const filtered = items().filter(it => {
    if (!q) return true;
    const hay = (it.seq + ' ' + it.name + ' ' + (it.cname || '')).toLowerCase();
    return hay.includes(q);
  });
  if (!filtered.length) { list.innerHTML = '<div class="empty">' + t().empty + '</div>'; return; }
  list.innerHTML = filtered.map(it => {
    const f = fileOf(it);
    const disabled = !f ? 'disabled' : '';
    const active = (f && state.file === f) ? 'active ' + colorClass : '';
    const primary = isEN() ? it.name : (it.cname || it.name);
    const secondary = isEN() ? (it.cname || '') : (it.cname ? it.name : '');
    const subEn = secondary ? `<span class="en">${secondary}</span>` : '';
    const tip = !f ? ' title="English version not available yet"' : '';
    return `<a href="#" class="${active} ${disabled}" data-file="${f || ''}" data-name="${it.seq} — ${primary}"${tip}>
      <span class="seq">${it.seq}</span>${primary}${subEn}
    </a>`;
  }).join('');
  list.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      if (a.classList.contains('disabled') || !a.dataset.file) return;
      load(a.dataset.file, a.dataset.name);
    });
  });
}

function load(file, name) {
  state.file = file;
  document.getElementById('frame').src = file;
  document.getElementById('name').textContent = name;
  document.getElementById('open-new').href = file;
  // .msg 路徑：v1/Agent/Foo.html -> v1/Agent/msg/Foo.msg (zh & en 都有)
  const msgPath = file.replace(/\/([^/]+)\.html$/, '/msg/$1.msg');
  const msgBtn = document.getElementById('open-msg');
  msgBtn.style.display = '';
  msgBtn.href = msgPath;
  renderList();
}

document.querySelectorAll('.tab').forEach(t2 => {
  t2.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t2.classList.add('active');
    state.type = t2.dataset.type;
    state.file = null;
    document.getElementById('frame').src = 'about:blank';
    document.getElementById('name').textContent = t().placeholder;
    renderList();
  });
});

document.querySelectorAll('.vbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.vbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.v = b.dataset.v;
    if (state.file) {
      const m = state.file.match(/([AP]\d{3})_/);
      if (m) {
        const same = items().find(it => it.seq === m[1]);
        if (same) {
          const f = fileOf(same);
          if (f) { load(f, same.seq + ' — ' + (isEN() ? same.name : (same.cname || same.name))); return; }
        }
      }
    }
    renderList();
  });
});

document.querySelectorAll('.langtoggle button').forEach(b => {
  b.addEventListener('click', () => {
    if (state.lang === b.dataset.lang) return;
    state.lang = b.dataset.lang;
    localStorage.setItem('powerofcopilot.lang', state.lang);
    document.querySelectorAll('.langtoggle button').forEach(x => x.classList.toggle('active', x.dataset.lang === state.lang));
    applyI18n();
    if (state.file) {
      const m = state.file.match(/([AP]\d{3})_/);
      if (m) {
        const same = items().find(it => it.seq === m[1]);
        if (same) {
          const f = fileOf(same);
          if (f) { load(f, same.seq + ' — ' + (isEN() ? same.name : (same.cname || same.name))); renderList(); return; }
        }
      }
      state.file = null;
      document.getElementById('frame').src = 'about:blank';
      document.getElementById('name').textContent = t().placeholder;
    }
    renderList();
  });
});

document.getElementById('q').addEventListener('input', renderList);

document.querySelectorAll('.langtoggle button').forEach(x => x.classList.toggle('active', x.dataset.lang === state.lang));
applyI18n();
renderList();
</script>
